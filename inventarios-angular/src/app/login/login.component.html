<div class="d-flex align-items-center justify-content-center min-vh-100" style="background:linear-gradient(135deg,#6c63ff,#3f3d56);">
  <div class="card shadow-lg" style="width:400px;border-radius:16px;">
    <div class="card-body p-5">
      <div class="text-center mb-4">
        <span style="font-size:3rem;">📦</span>
        <h4 class="fw-bold mt-2">Sistema de Inventarios</h4>
        <p class="text-muted small">Ingresa tus credenciales</p>
      </div>
      <div *ngIf="error" class="alert alert-danger py-2 small">{{ error }}</div>
      <form (ngSubmit)="onLogin()">
        <div class="mb-3">
          <label class="form-label fw-semibold">Usuario</label>
          <input type="text" class="form-control" [(ngModel)]="usuario" name="usuario" placeholder="admin" required>
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold">Contraseña</label>
          <input type="password" class="form-control" [(ngModel)]="password" name="password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">Iniciar Sesión</button>
      </form>
      <div class="mt-3 p-3 bg-light rounded text-center small">
        <strong>Demo:</strong> usuario <code>admin</code> / contraseña <code>admin123</code>
      </div>
    </div>
  </div>
</div>
