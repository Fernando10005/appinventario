<div class="container py-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h4 class="fw-bold mb-0">👥 Empleados</h4>
    <a routerLink="/empleados/agregar" class="btn btn-success btn-sm">+ Agregar</a>
  </div>
  <div class="input-group mb-3" style="max-width:400px">
    <input type="text" class="form-control form-control-sm" placeholder="Buscar por nombre..." [(ngModel)]="busqueda">
    <button class="btn btn-outline-primary btn-sm" (click)="buscar()">Buscar</button>
    <button class="btn btn-outline-secondary btn-sm" (click)="busqueda='';cargar()">✕</button>
  </div>
  <div class="card shadow-sm border-0">
    <div class="card-body p-0">
      <table class="table table-hover align-middle mb-0">
        <thead class="table-dark">
          <tr>
            <th>ID</th><th>Nombre</th><th>Apellido</th><th>Email</th>
            <th>Depto.</th><th>Puesto</th><th class="text-center">Acciones</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let e of empleados">
            <td>{{ e.idEmpleado }}</td>
            <td class="fw-semibold">{{ e.nombre }}</td>
            <td>{{ e.apellido }}</td>
            <td><small>{{ e.email }}</small></td>
            <td><span class="badge bg-secondary">{{ e.departamento }}</span></td>
            <td>{{ e.puesto }}</td>
            <td class="text-center">
              <button (click)="editar(e.idEmpleado)" class="btn btn-warning btn-sm me-1">Editar</button>
              <button (click)="eliminar(e.idEmpleado)" class="btn btn-danger btn-sm">Eliminar</button>
            </td>
          </tr>
          <tr *ngIf="empleados.length===0">
            <td colspan="7" class="text-center text-muted py-4">No hay empleados registrados</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
